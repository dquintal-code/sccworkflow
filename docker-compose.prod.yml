services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facility_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-parks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the production env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parks} -d ${POSTGRES_DB:-facility_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the production env file}
      APP_NAME: ${APP_NAME:-Facility Reservation Tracker}
      DUE_SOON_DAYS: ${DUE_SOON_DAYS:-3}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - reservation_documents:/app/storage/reservation_documents
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  postgres_data:
  reservation_documents:
