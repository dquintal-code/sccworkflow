services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: facility_tracker
      POSTGRES_USER: parks
      POSTGRES_PASSWORD: parks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parks -d facility_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://parks:parks@db:5432/facility_tracker
      APP_NAME: Facility Reservation Tracker
      DUE_SOON_DAYS: 3
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
